<svg viewBox="0 0 640 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333333"/>
    </marker>
  </defs>

  <!-- GitHub Repository -->
  <rect x="220" y="16" width="200" height="46" rx="6" fill="#F7F7F7" stroke="#333333" stroke-width="2"/>
  <text x="320" y="44" font-size="15" fill="#222222" text-anchor="middle">GitHub Repository</text>

  <!-- arrow to AWS Provider -->
  <line x1="320" y1="62" x2="320" y2="94" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- AWS Provider -->
  <rect x="220" y="96" width="200" height="46" rx="6" fill="#F0F0F0" stroke="#333333" stroke-width="2"/>
  <text x="320" y="124" font-size="15" fill="#222222" text-anchor="middle">AWS Provider</text>

  <!-- split lines -->
  <line x1="320" y1="142" x2="150" y2="178" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="320" y1="142" x2="500" y2="178" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- VPC -->
  <rect x="60" y="180" width="180" height="46" rx="6" fill="#F7F7F7" stroke="#333333" stroke-width="2"/>
  <text x="150" y="208" font-size="15" fill="#222222" text-anchor="middle">VPC</text>

  <!-- ALB -->
  <rect x="410" y="180" width="180" height="46" rx="6" fill="#F7F7F7" stroke="#333333" stroke-width="2"/>
  <text x="500" y="208" font-size="15" fill="#222222" text-anchor="middle">ALB</text>

  <!-- VPC -> EC2 -->
  <line x1="150" y1="226" x2="150" y2="258" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="60" y="260" width="180" height="46" rx="6" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
  <text x="150" y="288" font-size="15" fill="#222222" text-anchor="middle">EC2</text>

  <!-- ALB -> Auto Scaling -->
  <line x1="500" y1="226" x2="500" y2="258" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="410" y="260" width="180" height="46" rx="6" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
  <text x="500" y="288" font-size="15" fill="#222222" text-anchor="middle">Auto Scaling</text>

  <!-- Auto Scaling -> RDS -->
  <line x1="500" y1="306" x2="410" y2="340" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="220" y="342" width="220" height="50" rx="6" fill="#E8E8E8" stroke="#333333" stroke-width="2"/>
  <text x="330" y="372" font-size="15" fill="#222222" text-anchor="middle">RDS (MariaDB)</text>
</svg>
